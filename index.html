
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SENTRI - Asisten Digital Keuangan</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>SENTRI</h1>
        <p>Asisten Cerdas Keuangan Digital</p>
    </header>
    <main>
        <section class="fitur">
            <h2>Fitur Unggulan</h2>
            <div class="fitur-list">
                <button>📘 Edukasi Keuangan Interaktif</button>
                <button>🔍 Deteksi Kata Kunci Penipuan</button>
                <button>📢 Notifikasi Waspada Risiko</button>
                <button>📱 WhatsApp</button>
                <button>💬 Telegram</button>
            </div>
        </section>

        <section class="chatbox">
            <h2>Chatbot Interaktif</h2>
            <div class="chat-container" id="chatContainer"></div>
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Tanyakan sesuatu..." />
                <button onclick="sendMessage()">Kirim</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 SENTRI. Dibuat oleh Kokei Creativa.</p>
    </footer>

    <script src="chatbot.js"></script>
</body>
</html>
