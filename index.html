
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTRI Web App</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <h1>Selamat Datang di SENTRI</h1>
    <p>Solusi Cerdas Edukasi & Deteksi Finansial</p>
  </header>

  <main>
    <section id="chatbot">
      <h2>Asisten Virtual</h2>
      <div id="chat-container">
        <div id="chat-log"></div>
        <input type="text" id="user-input" placeholder="Tanyakan sesuatu..." />
        <button onclick="sendMessage()">Kirim</button>
      </div>
    </section>

    <section id="edukasi">
      <h2>Audio Edukasi</h2>
      <audio controls src="assets/audio/edukasi1.mp3"></audio>
    </section>

    <section id="kontak">
      <h2>Hubungi Kami</h2>
      <form>
        <input type="text" placeholder="Nama" required /><br />
        <input type="email" placeholder="Email" required /><br />
        <textarea placeholder="Pesan Anda" required></textarea><br />
        <button type="submit">Kirim</button>
      </form>
    </section>

    <section id="tautan-cepat">
      <h2>Tautan Penting</h2>
      <a href="https://wa.me/6281234567890" target="_blank">WhatsApp</a><br />
      <a href="https://t.me/sentribot" target="_blank">Telegram</a>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 SENTRI Project</p>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
