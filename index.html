
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTRI - Solusi AI Keuangan</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>SENTRI</h1>
    <p>Solusi AI Edukatif untuk Deteksi dan Pencegahan Penipuan Keuangan</p>
  </header>
  <main>
    <section>
      <h2>Selamat datang di SENTRI</h2>
      <p>Aplikasi ini membantu masyarakat mengenali penipuan dan mendapatkan edukasi keuangan secara interaktif.</p>
      <button onclick="kirimWA()">Hubungi via WhatsApp</button>
      <button onclick="kirimTelegram()">Hubungi via Telegram</button>
    </section>

    <section>
      <h2>Audio Edukasi</h2>
      <audio controls>
        <source src="assets/audio-edukasi.mp3" type="audio/mp3" />
        Browser Anda tidak mendukung audio.
      </audio>
    </section>

    <section>
      <h2>Form Kontak</h2>
      <form id="kontakForm">
        <input type="text" placeholder="Nama Anda" required /><br />
        <input type="email" placeholder="Email Anda" required /><br />
        <textarea placeholder="Pesan Anda"></textarea><br />
        <button type="submit">Kirim</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 SENTRI - Kokei Creativa</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
