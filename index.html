
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SENTRI AI - Deteksi Penipuan & Judi</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 0; }
    #chatbox {
      position: fixed; bottom: 20px; right: 20px; width: 300px;
      border: 1px solid #ccc; border-radius: 10px;
      background: #f9f9f9; box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    #messages { height: 250px; overflow-y: auto; padding: 10px; }
    #input-area { display: flex; border-top: 1px solid #ccc; }
    #input-area input {
      flex: 1; padding: 10px; border: none; border-radius: 0 0 0 10px;
    }
    #input-area button {
      padding: 10px; border: none; background: #007BFF; color: white;
      border-radius: 0 0 10px 0; cursor: pointer;
    }
    .bot { color: #444; margin: 5px 0; }
    .user { color: #007BFF; margin: 5px 0; text-align: right; }
  </style>
</head>
<body>

<div id="chatbox">
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="userInput" placeholder="Ketik pesan...">
    <button onclick="sendMessage()">Kirim</button>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById('messages');

  function sendMessage() {
    const input = document.getElementById('userInput');
    const userText = input.value.trim();
    if (!userText) return;

    showMessage(userText, 'user');
    input.value = '';

    const lower = userText.toLowerCase();
    let response = "";

    if (/(slot|judi|togel|kasino|chip)/.test(lower)) {
      response = "🚫 Awas, aktivitas judi online bisa merugikan. Yuk mulai investasi yang bermanfaat seperti reksa dana atau emas!";
    } else if (/(klik.*link|transfer.*dulu|hadiah|undian|penipuan|kode otp)/.test(lower)) {
      response = "⚠️ Waspada! Ini terindikasi penipuan. Jangan klik link atau transfer uang sebelum memastikan kebenarannya.";
    } else {
      response = "✅ Terima kasih! Jika kamu butuh bantuan, tanya saja ya.";
    }

    setTimeout(() => showMessage(response, 'bot'), 500);
  }

  function showMessage(text, sender) {
    const div = document.createElement('div');
    div.className = sender;
    div.innerText = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
</script>

</body>
</html>
