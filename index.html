<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRI AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chatbox">
        <h1>SENTRI - Asisten Keuangan Aman</h1>
        <div id="chatlog"></div>
        <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Kirim</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
