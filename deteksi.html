<!DOCTYPE html>
<html>
<head>
<title>SENTRI - Deteksi</title>
<link rel='stylesheet' href='style.css'>
</head>
<body>
<h1>Halaman Deteksi</h1>
<textarea id='inputText'></textarea>
<button onclick='deteksi()'>Deteksi</button>
<p id='hasil'></p>
<script src='js/chatbot.js'></script>
<script>
function deteksi() {
 const kata = ['slot', 'judi', 'penipuan'];
 const teks = document.getElementById('inputText').value.toLowerCase();
 const hasil = kata.some(k => teks.includes(k)) ? 'Konten mencurigakan terdeteksi!' : 'Aman';
 document.getElementById('hasil').innerText = hasil;
 new Audio('assets/alert.mp3').play();
}
</script>
</body>
</html>
